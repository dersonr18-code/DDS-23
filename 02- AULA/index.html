<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 2</title>
    <link rel="icon" href="https://blog.logomyway.com/wp-content/uploads/2021/08/autobot-logo-1024x1009.png"/>
</head>
    <body>
        <h1>TABELA INCRÍVEL</h1>

        <table border="5">
            <!-- Cabeçalho da tabela -->
            <thead>
                <tr>
                    <th>NOME</th>
                    <th>ITEM</th>
                    <th>QUANTIDADE</th>
                    <th>PREÇO</th>
                </tr>
            </thead>

            <!-- Corpo da tabela -->
            <tbody>
                <!-- Crio uma linha -->
                <tr>
                    <!-- Crio uma coluna -->
                    <td> Cristiano </td>
                    <td> Perfume </td>
                    <td> 7 </td>
                    <td> R$777.77 </td>
                </tr>
                <tr>
                    <td>Kobe</td>
                    <td>Rolex</td>
                    <td>15</td>
                    <td>R$2500.52</td>
                </tr>
                <tr>
                    <td>Marina</td>
                    <td>Armani</td>
                    <td>27</td>
                    <td>R$5105.15</td>
                </tr>
                <tr>
                    <td rowspan="2">Miguel</td>
                    <td>Camisa do Vasco</td>
                    <td>3</td>
                    <td>R$ 900</td>
                </tr>
                <tr>
                    <td>Fone bluetoof</td>
                    <td>16</td>
                    <td>R$ 500</td>
                </tr>
            </tbody>
            <!-- Rodape da tabela -->
             <tfoot>
                <tr>
                    <td colspan="4">Todos os direitos reservados</td>
                </tr>
             </tfoot>
        </table>
    </body>

</html>
